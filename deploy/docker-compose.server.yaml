name: trace-g-server

services:
  ollama:
    image: ${OLLAMA_IMAGE:?Set OLLAMA_IMAGE to an explicit version or digest}
    container_name: trace-g-ollama
    restart: unless-stopped
    gpus: all
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /models
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-32}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    ports:
      - 127.0.0.1:11434:11434
    volumes:
      - ollama-models:/models
    networks:
      - model-internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  ollama-models:
    name: trace-g-ollama-models

networks:
  model-internal:
    name: trace-g-model-internal
    driver: bridge
    internal: true
    labels:
      trace-g.network-policy: ollama-only
